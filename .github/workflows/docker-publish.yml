name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Custom image tag (e.g., latest, stable)"
        required: false
        default: ""
        type: string

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vibe-kanban-docker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=

      - name: Determine image tags
        id: tags
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          
          # Add custom tag if provided
          if [ -n "${{ inputs.image-tag }}" ]; then
            TAGS="$TAGS,ghcr.io/${{ env.IMAGE_NAME }}:${{ inputs.image-tag }}"
          fi
          
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "full-image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: Build and push with Docker Buildx
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Output image info
        run: |
          echo "Image published successfully!"
          echo "Image: ${{ steps.tags.outputs.full-image }}"
          echo "Tags: ${{ steps.tags.outputs.tags }}"
          
      - name: Create deployment notification
        if: github.event_name == 'release'
        run: |
          echo "::notice title=Docker Image Published::Image: ${{ steps.tags.outputs.full-image }}:${{ github.event.release.tag_name }}"
