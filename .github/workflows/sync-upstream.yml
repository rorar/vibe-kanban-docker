name: Sync with Upstream

on:
  schedule:
    - cron: "0 */6 * * *" # Check every 6 hours
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild even if version unchanged"
        required: false
        default: "false"
        type: boolean
      coding_agents:
        description: "Additional coding agents (space-separated)"
        required: false
        default: ""
        type: string

env:
  NPM_PACKAGE: vibe-kanban

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      npm_version: ${{ steps.check.outputs.npm_version }}
      current_version: ${{ steps.check.outputs.current_version }}
      has_update: ${{ steps.check.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check npm for latest version
        id: check
        run: |
          NPM_VERSION=$(npm view ${{ env.NPM_PACKAGE }} version)
          echo "Latest npm version: $NPM_VERSION"
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT
          
          # Get current built version from git tag
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "")
          if [ -z "$CURRENT" ]; then
            CURRENT="unknown"
          fi
          echo "Current built version: $CURRENT"
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT
          
          if [ "$CURRENT" != "$NPM_VERSION" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-upstream
    runs-on: ubuntu-latest
    if: needs.check-upstream.outputs.has_update == 'true' || github.event.inputs.force_rebuild == 'true'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VIBE_VERSION=${{ needs.check-upstream.outputs.npm_version }}
            CODING_AGENTS=${{ github.event.inputs.coding_agents }}

      - name: Configure git identity
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Create git tag
        env:
          VERSION: ${{ needs.check-upstream.outputs.npm_version }}
        run: |
          # Delete local tag if exists (allows re-tagging after rebuild)
          git tag -d "v${VERSION}" 2>/dev/null || true
          git tag -a "v${VERSION}" -m "vibe-kanban v${VERSION}"
          git push origin "v${VERSION}" --force
          echo "::notice title=Image Updated::Docker image rebuilt with vibe-kanban v${VERSION}"
