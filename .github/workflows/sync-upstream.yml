name: Sync with Upstream

on:
  schedule:
    - cron: "0 */6 * * *" # Check every 6 hours
  workflow_dispatch:
  repository_dispatch:
    types:
      - upstream-release

env:
  UPSTREAM_REPO: BloopAI/vibe-kanban

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      has_update: ${{ steps.check.outputs.has_update }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for upstream updates
        id: check
        run: |
          UPSTREAM_VERSION=$(curl -s https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/releases/latest | jq -r '.tag_name // empty')
          
          if [ -z "$UPSTREAM_VERSION" ]; then
            echo "Could not fetch upstream version"
            exit 1
          fi
          
          echo "Upstream version: $UPSTREAM_VERSION"
          
          # Check if we already have this version built
          if gh api "ghcr.io/${{ github.repository }}/vibe-kanban-docker:${UPSTREAM_VERSION#v}" --silent 2>/dev/null; then
            echo "Version $UPSTREAM_VERSION already exists"
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "new_version=" >> $GITHUB_OUTPUT
          else
            echo "New version available: $UPSTREAM_VERSION"
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "new_version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Sync fork
        if: steps.check.outputs.has_update == 'true'
        run: |
          echo "Syncing fork with upstream..."
          # Add upstream as remote
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || git remote set-url upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          
          # Fetch upstream
          git fetch upstream
          git fetch --tags upstream
          
          # Get current branch
          CURRENT_BRANCH=$(git branch --show-current)
          echo "Current branch: $CURRENT_BRANCH"
          
          # Check if main diverged significantly
          git log --oneline upstream/main -n 20 > /tmp/upstream_log.txt
          git log --oneline HEAD -n 20 > /tmp/current_log.txt
          
          echo "Upstream recent commits:"
          cat /tmp/upstream_log.txt
          echo "---"
          echo "Current recent commits:"
          cat /tmp/current_log.txt

      - name: Create PR for sync
        if: steps.check.outputs.has_update == 'true'
        env:
          VERSION: ${{ steps.check.outputs.new_version }}
        run: |
          # Create a sync branch
          BRANCH_NAME="sync/${VERSION}"
          git checkout -b "$BRANCH_NAME" || git checkout "$BRANCH_NAME"
          
          # Try to merge or rebase
          git fetch upstream main
          
          # Check if we can fast-forward
          if git merge-base --is-ancestor HEAD upstream/main 2>/dev/null; then
            echo "Already up to date with upstream/main"
          else
            echo "Updating from upstream..."
            git merge upstream/main --no-edit || echo "Merge conflict may need manual resolution"
          fi
          
          # Update version if needed
          echo "$VERSION" > version.txt
          git add -A
          
          # Commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync with upstream $VERSION"
          fi
          
          # Push branch
          git push -u origin "$BRANCH_NAME" || true
          
          # Create PR
          gh pr create \
            --title "Sync with upstream $VERSION" \
            --body "Syncing fork with upstream release $VERSION" \
            --base main \
            --label "sync" || echo "PR may already exist"

  build-on-upstream-release:
    needs: check-upstream
    runs-on: ubuntu-latest
    if: needs.check-upstream.outputs.has_update == 'true'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.check-upstream.outputs.new_version }}

      - name: Create GitHub Release
        if: contains(needs.check-upstream.outputs.new_version, 'v')
        env:
          VERSION: ${{ needs.check-upstream.outputs.new_version }}
        run: |
          # Create annotated tag if it doesn't exist
          if ! git tag --list "$VERSION" | grep -q "$VERSION"; then
            git tag -a "$VERSION" -m "Sync with upstream $VERSION"
            git push origin "$VERSION"
          fi
          
          # Create release if it doesn't exist
          if ! gh release view "$VERSION" >/dev/null 2>&1; then
            gh release create "$VERSION" \
              --title "Docker Release $VERSION" \
              --notes "Docker image synchronized with upstream $VERSION"
          fi
